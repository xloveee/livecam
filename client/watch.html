<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>livecam</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fff;
        }
        video {
            width: 100%;
            max-width: 960px;
            background: #000;
            aspect-ratio: 16/9;
            border-radius: 4px;
        }
        #controls {
            margin-top: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        select {
            background: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 0.5rem 0.8rem;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
        }
        select:disabled { opacity: 0.4; cursor: default; }
        button {
            background: #d32f2f;
            color: #fff;
            border: none;
            padding: 0.6rem 1.6rem;
            font-size: 0.95rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #b71c1c; }
        button:disabled { background: #555; cursor: default; }
        #status {
            font-size: 0.85rem;
            color: #aaa;
        }
        .error { color: #ef5350; }
        .viewer-count {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.6rem;
        }
        #offline-banner {
            display: none;
            margin-top: 2rem;
            text-align: center;
            color: #888;
            font-size: 1rem;
        }
        #offline-banner .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        #offline-banner.live .dot { background: #d32f2f; }
        #password-prompt {
            display: none;
            margin-top: 1.5rem;
            text-align: center;
        }
        #password-prompt input {
            background: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 0.5rem 0.8rem;
            font-size: 0.9rem;
            border-radius: 4px;
            width: 220px;
            margin-right: 0.5rem;
        }
        #password-prompt button {
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
        }
        #password-error {
            color: #ef5350;
            font-size: 0.85rem;
            margin-top: 0.4rem;
        }
    </style>
</head>
<body>

    <h1>livecam</h1>

    <video id="player" autoplay controls playsinline></video>

    <div id="controls">
        <select id="quality-select" disabled>
            <option value="">Auto</option>
            <option value="h">High (1080p)</option>
            <option value="m">Medium (720p)</option>
            <option value="l">Low (360p)</option>
        </select>
        <span id="status">Checking stream...</span>
    </div>
    <div class="viewer-count" id="viewer-count"></div>

    <div id="offline-banner">
        <span class="dot"></span>
        <span id="offline-text">No broadcast right now</span>
    </div>

    <div id="password-prompt">
        <label>This broadcast requires a password</label><br><br>
        <input type="password" id="room-password-input" placeholder="Enter password" autocomplete="off">
        <button id="btn-password-submit">Join</button>
        <div id="password-error"></div>
    </div>

    <script>
        const video       = document.getElementById('player');
        const qualitySelect = document.getElementById('quality-select');
        const statusEl    = document.getElementById('status');
        const viewerCountEl = document.getElementById('viewer-count');
        const offlineBanner = document.getElementById('offline-banner');
        const offlineText = document.getElementById('offline-text');
        const passwordPrompt = document.getElementById('password-prompt');
        const passwordInput  = document.getElementById('room-password-input');
        const btnPasswordSubmit = document.getElementById('btn-password-submit');
        const passwordError  = document.getElementById('password-error');

        let roomId = null;
        let roomIdFromURL = false;
        let sessionId = null;
        let roomPassword = '';
        let pc = null;
        let mediaWatchdogInterval = null;
        let pollInterval = null;
        let lastBytesReceived = 0;
        let stallCount = 0;
        let viewerState = 'init';

        /* ── State Machine ──────────────────────────────────────── */

        function setState(next) {
            if (next === viewerState) return;
            viewerState = next;
            renderState();
            managePoll();
        }

        function renderState() {
            offlineBanner.style.display = 'none';
            passwordPrompt.style.display = 'none';
            statusEl.classList.remove('error');

            switch (viewerState) {
                case 'offline':
                    offlineBanner.style.display = 'block';
                    offlineBanner.classList.remove('live');
                    offlineText.textContent = 'No broadcast right now';
                    statusEl.textContent = 'Offline';
                    viewerCountEl.textContent = '';
                    qualitySelect.disabled = true;
                    break;
                case 'need_password':
                    passwordPrompt.style.display = 'block';
                    statusEl.textContent = 'Password required';
                    qualitySelect.disabled = true;
                    break;
                case 'connecting':
                    statusEl.textContent = 'Connecting...';
                    qualitySelect.disabled = true;
                    break;
                case 'live':
                    statusEl.textContent = 'Live';
                    qualitySelect.disabled = false;
                    break;
                case 'room_full':
                    offlineBanner.style.display = 'block';
                    offlineBanner.classList.remove('live');
                    offlineText.textContent = 'Room is full — retrying...';
                    statusEl.textContent = 'Waiting';
                    qualitySelect.disabled = true;
                    break;
                case 'rate_limited':
                    offlineBanner.style.display = 'block';
                    offlineBanner.classList.remove('live');
                    offlineText.textContent = 'Too many requests — retrying...';
                    statusEl.textContent = 'Waiting';
                    qualitySelect.disabled = true;
                    break;
                default:
                    break;
            }
        }

        function clearPollTimer() {
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
        }

        function managePoll() {
            clearPollTimer();

            if (viewerState === 'room_full' || viewerState === 'rate_limited') {
                pollInterval = setInterval(function () { connectWHEP(); }, 5000);
            } else if (viewerState !== 'init' && viewerState !== 'connecting') {
                pollInterval = setInterval(pollActive, 5000);
            }
        }

        async function pollActive() {
            try {
                const resp = await fetch('/api/active');
                if (!resp.ok) return;
                const data = await resp.json();

                if (!data.room_id) {
                    if (viewerState === 'live') { teardownConnection(); }
                    setState('offline');
                    return;
                }

                if (viewerState === 'live') {
                    if (!roomIdFromURL && data.room_id !== roomId) {
                        teardownConnection();
                        roomId = data.room_id;
                        roomPassword = '';
                        passwordInput.value = '';
                    } else {
                        await checkRoomAlive();
                        return;
                    }
                }

                if (!roomIdFromURL) { roomId = data.room_id; }

                if (data.has_password && !roomPassword) {
                    setState('need_password');
                } else {
                    if (!data.has_password) { roomPassword = ''; passwordInput.value = ''; }
                    connectWHEP();
                }
            } catch (e) { /* ignore */ }
        }

        /* ── Utilities ──────────────────────────────────────────── */

        function getRoomIdFromURL() {
            const parts = window.location.pathname.split('/').filter(Boolean);
            if (parts.length >= 2 && parts[0] === 'watch') {
                return parts[1];
            }
            return null;
        }

        async function checkRoomAlive() {
            if (!roomId) return true;
            try {
                const resp = await fetch('/api/room_info/' + roomId);
                if (!resp.ok) return true;
                const info = await resp.json();
                if (!info.is_live) {
                    teardownConnection();
                    setState('offline');
                    return false;
                }
                viewerCountEl.textContent = info.viewer_count + ' watching';
                return true;
            } catch (e) { return true; }
        }

        async function fetchICEConfig() {
            try {
                const resp = await fetch('/api/config');
                if (!resp.ok) return {};
                return await resp.json();
            } catch (e) {
                return { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
            }
        }

        async function setQuality(rid) {
            if (!sessionId || !roomId) return;
            try {
                await fetch('/api/quality/' + roomId, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Id': sessionId
                    },
                    body: JSON.stringify({ rid: rid || null })
                });
            } catch (e) { /* ignore */ }
        }

        qualitySelect.onchange = function () { setQuality(qualitySelect.value || null); };

        /* ── WebRTC Lifecycle ───────────────────────────────────── */

        function teardownConnection() {
            clearPollTimer();
            if (mediaWatchdogInterval) { clearInterval(mediaWatchdogInterval); mediaWatchdogInterval = null; }
            if (pc) {
                if (sessionId && roomId) {
                    fetch('/api/whep/' + roomId, {
                        method: 'DELETE',
                        headers: { 'X-Session-Id': sessionId }
                    }).catch(function () {});
                }
                var dying = pc;
                pc = null;
                dying.oniceconnectionstatechange = null;
                dying.onconnectionstatechange = null;
                dying.close();
            }
            video.srcObject = null;
            sessionId = null;
            lastBytesReceived = 0;
            stallCount = 0;
        }

        function startMediaWatchdog() {
            lastBytesReceived = 0;
            stallCount = 0;
            mediaWatchdogInterval = setInterval(async function () {
                if (!pc) return;
                try {
                    const stats = await pc.getStats();
                    let totalBytes = 0;
                    stats.forEach(function (report) {
                        if (report.type === 'inbound-rtp' && report.kind === 'video') {
                            totalBytes += report.bytesReceived || 0;
                        }
                    });
                    if (totalBytes > lastBytesReceived) {
                        lastBytesReceived = totalBytes;
                        stallCount = 0;
                    } else if (lastBytesReceived > 0) {
                        stallCount++;
                        if (stallCount >= 2) {
                            teardownConnection();
                            setState('offline');
                        }
                    }
                } catch (e) { /* pc may have closed mid-check */ }
            }, 1000);
        }

        function onPeerStateChange() {
            if (!pc) return;
            var s = pc.iceConnectionState;
            if (s === 'connected' || s === 'completed') {
                setState('live');
                checkRoomAlive();
                startMediaWatchdog();
            } else if (s === 'disconnected' || s === 'failed' || s === 'closed') {
                teardownConnection();
                setState('offline');
            }
        }

        async function connectWHEP() {
            if (!roomId) return;
            if (viewerState === 'connecting') return;

            teardownConnection();
            setState('connecting');

            const config = await fetchICEConfig();

            pc = new RTCPeerConnection({
                iceServers: config.iceServers || []
            });

            pc.ontrack = function (event) {
                if (video.srcObject !== event.streams[0]) {
                    video.srcObject = event.streams[0];
                }
            };

            pc.oniceconnectionstatechange = onPeerStateChange;
            pc.onconnectionstatechange = onPeerStateChange;

            pc.addTransceiver('video', { direction: 'recvonly' });
            pc.addTransceiver('audio', { direction: 'recvonly' });

            try {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                const headers = { 'Content-Type': 'application/sdp' };
                if (roomPassword) {
                    headers['X-Room-Password'] = roomPassword;
                }

                const response = await fetch('/api/whep/' + roomId, {
                    method: 'POST',
                    headers: headers,
                    body: pc.localDescription.sdp
                });

                if (response.status === 403) {
                    teardownConnection();
                    passwordError.textContent = roomPassword ? 'Incorrect password' : '';
                    setState('need_password');
                    return;
                }
                if (response.status === 503) {
                    teardownConnection();
                    setState('room_full');
                    return;
                }
                if (response.status === 429) {
                    teardownConnection();
                    setState('rate_limited');
                    return;
                }
                if (!response.ok) {
                    throw new Error('Server returned ' + response.status);
                }

                sessionId = response.headers.get('X-Session-Id');
                const answerSdp = await response.text();
                await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

            } catch (err) {
                console.error('WHEP connection failed:', err);
                teardownConnection();
                setState('offline');
            }
        }

        /* ── User Actions ───────────────────────────────────────── */

        btnPasswordSubmit.onclick = function () {
            roomPassword = passwordInput.value;
            if (!roomPassword) {
                passwordError.textContent = 'Please enter a password';
                return;
            }
            passwordError.textContent = '';
            connectWHEP();
        };

        passwordInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') btnPasswordSubmit.click();
        });

        /* ── Init ───────────────────────────────────────────────── */

        (async function init() {
            roomId = getRoomIdFromURL();
            if (roomId) { roomIdFromURL = true; connectWHEP(); return; }
            await pollActive();
            if (viewerState === 'init') setState('offline');
        })();
    </script>
</body>
</html>
