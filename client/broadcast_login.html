<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="livecam-api-root" content="">
    <title>Broadcast — livecam</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem 1rem;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .login-box {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        label {
            font-size: 0.85rem;
            color: #aaa;
        }
        input {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #333;
            padding: 0.6rem 0.8rem;
            font-size: 16px; /* Prevent iOS zoom on focus */
            border-radius: 4px;
            width: 100%;
            margin-top: 0.3rem;
        }
        input:focus {
            outline: none;
            border-color: #d32f2f;
        }
        button {
            color: #fff;
            border: none;
            padding: 0.65rem 1.8rem;
            font-size: 0.95rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.15s;
            background: #d32f2f;
            width: 100%;
        }
        button:hover { background: #b71c1c; }
        button:disabled { background: #333; cursor: default; }
        .livecam-sponsor-footer {
            margin-top: auto;
            padding-top: 1rem;
            text-align: center;
            font-size: 0.7rem;
            color: #666;
            line-height: 1.35;
            width: 100%;
            max-width: 380px;
        }
        .livecam-sponsor-footer[hidden] { display: none !important; }
        .livecam-sponsor-footer a { color: #888; text-decoration: none; }
        .livecam-sponsor-footer a:hover { text-decoration: underline; color: #aaa; }
        .error {
            font-size: 0.85rem;
            color: #ef5350;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
    <h1>Broadcaster Login</h1>
    <div class="subtitle">Authenticate to access the broadcast studio</div>
    <div class="login-box">
        <div>
            <label for="login-pwd">Password</label>
            <input type="password" id="login-pwd" placeholder="Page password" autocomplete="off">
        </div>
        <div>
            <label for="login-key">Stream Key</label>
            <input type="password" id="login-key" placeholder="32-character key" autocomplete="off" spellcheck="false">
        </div>
        <button id="btn-login">Log In</button>
        <div class="error" id="login-error"></div>
    </div>

    <footer id="livecam-sponsor-footer" class="livecam-sponsor-footer" hidden></footer>

    <script src="/js/sponsor-footer.js"></script>
    <script>
        loadLivecamSponsorFooter();
    </script>
    <script>
        var pwdInput = document.getElementById('login-pwd');
        var keyInput = document.getElementById('login-key');
        var btnLogin = document.getElementById('btn-login');
        var errorEl = document.getElementById('login-error');

        btnLogin.onclick = async function () {
            errorEl.textContent = '';
            var pwd = pwdInput.value;
            var key = keyInput.value.trim();
            if (!pwd && !key) {
                errorEl.textContent = 'Enter your credentials';
                return;
            }
            btnLogin.disabled = true;
            try {
                var resp = await fetch('/api/auth/broadcast', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd, stream_key: key })
                });
                if (!resp.ok) {
                    errorEl.textContent = 'Invalid credentials';
                    return;
                }
                window.location.reload();
            } catch (e) {
                errorEl.textContent = 'Connection error — try again';
            } finally {
                btnLogin.disabled = false;
            }
        };

        keyInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') { btnLogin.click(); }
        });
        pwdInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') { keyInput.focus(); }
        });
    </script>
</body>
</html>
