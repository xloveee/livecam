<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>livecam</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            overflow: hidden;
            overflow-x: hidden;
        }
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: row;
            min-height: 100vh;
            min-height: 100dvh;
        }
        .main-content {
            flex: 1;
            min-height: 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            overflow-y: auto;
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fff;
            flex-shrink: 0;
        }
        video {
            width: 100%;
            max-width: 960px;
            flex: 1 1 auto;
            min-height: 0;
            max-height: 100%;
            background: #000;
            aspect-ratio: 16/9;
            border-radius: 4px;
            object-fit: contain;
        }
        #controls {
            margin-top: 0.6rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }
        select {
            background: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 0.5rem 0.8rem;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
        }
        select:disabled { opacity: 0.4; cursor: default; }
        button {
            background: #d32f2f;
            color: #fff;
            border: none;
            padding: 0.6rem 1.6rem;
            font-size: 0.95rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #b71c1c; }
        button:disabled { background: #555; cursor: default; }
        #status {
            font-size: 0.85rem;
            color: #aaa;
        }
        .error { color: #ef5350; }
        .viewer-count {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.4rem;
            flex-shrink: 0;
        }
        #offline-banner {
            display: none;
            margin-top: 0.8rem;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        #offline-banner .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        #offline-banner.live .dot { background: #d32f2f; }
        #password-prompt {
            display: none;
            margin-top: 0.8rem;
            text-align: center;
            flex-shrink: 0;
        }
        #password-prompt input {
            background: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 0.5rem 0.8rem;
            font-size: 16px; /* Prevent iOS zoom on focus */
            border-radius: 4px;
            width: 220px;
            margin-right: 0.5rem;
        }
        #password-prompt button {
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
        }
        #password-error {
            color: #ef5350;
            font-size: 0.85rem;
            margin-top: 0.4rem;
        }

        /* ── Chat Panel ──────────────────────────────────── */
        .chat-panel {
            width: 340px;
            min-width: 340px;
            min-height: 0;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #1a1a1a;
            background: #0d0d0d;
        }
        .chat-header {
            padding: 0.8rem 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-status {
            font-size: 0.7rem;
            font-weight: 400;
            color: #666;
        }
        .chat-status.connected { color: #4caf50; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }
        .chat-msg {
            font-size: 0.82rem;
            line-height: 1.4;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            word-break: break-word;
        }
        .chat-msg:hover { background: rgba(255,255,255,0.03); }
        .chat-msg .nick {
            font-weight: 600;
            margin-right: 0.3rem;
        }
        .chat-msg .nick.broadcaster { color: #d32f2f; }
        .chat-msg .nick.mod { color: #5e35b1; }
        .chat-msg .nick.viewer { color: #1e88e5; }
        .chat-msg.system {
            color: #666;
            font-style: italic;
            font-size: 0.78rem;
        }
        .chat-input-area {
            border-top: 1px solid #1a1a1a;
            padding: 0.6rem;
            position: relative;
        }
        .chat-input-area input {
            flex: 1;
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #333;
            padding: 0.5rem 0.6rem;
            font-size: 16px;
            border-radius: 4px;
            outline: none;
        }
        .chat-input-area input:focus { border-color: #d32f2f; }
        .chat-input-area button {
            padding: 0.5rem 0.8rem;
            font-size: 0.82rem;
            white-space: nowrap;
        }
        .chat-guest-bar {
            display: flex;
            gap: 0.4rem;
            cursor: pointer;
        }
        .chat-guest-bar input {
            pointer-events: none;
            opacity: 0.4;
        }
        .chat-guest-bar button {
            opacity: 0.4;
            pointer-events: none;
        }
        .chat-nick-prompt {
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            background: #151515;
            border: 1px solid #2a2a2a;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            padding: 0.7rem 0.6rem;
            display: none;
            flex-direction: column;
            gap: 0.4rem;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.5);
        }
        .chat-nick-prompt.visible { display: flex; }
        .chat-nick-prompt label {
            font-size: 0.78rem;
            color: #aaa;
            font-weight: 600;
        }
        .chat-nick-prompt .nick-row {
            display: flex;
            gap: 0.4rem;
        }
        .chat-nick-prompt button {
            background: #1e88e5;
            font-weight: 600;
        }
        .chat-nick-prompt button:hover { background: #1565c0; }
        .chat-nick-prompt .nick-error {
            font-size: 0.72rem;
            color: #ef5350;
            min-height: 0;
        }
        .chat-nick-prompt .nick-hint {
            font-size: 0.68rem;
            color: #555;
        }
        .chat-send {
            display: flex;
            gap: 0.4rem;
        }
        .chat-nick-badge {
            font-size: 0.72rem;
            color: #555;
            padding: 0 0.2rem 0.2rem;
        }
        .chat-nick-badge span { color: #1e88e5; font-weight: 600; }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .main-content { padding: 0.8rem; }
            h1 { font-size: 1rem; margin-bottom: 0.4rem; }
            video { max-height: 45vh; }
            .chat-panel {
                width: 100%;
                min-width: 0;
                flex: 1 1 0;
                min-height: 180px;
                border-left: none;
                border-top: 1px solid #1a1a1a;
            }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <h1>Independent Broadcasting - Github xloveee/livecam</h1>

        <video id="player" autoplay controls playsinline></video>

        <div id="controls">
            <select id="quality-select" disabled>
                <option value="">Auto</option>
                <option value="h">High (1080p)</option>
                <option value="m">Medium (720p)</option>
                <option value="l">Low (360p)</option>
            </select>
            <span id="status">Checking stream...</span>
        </div>
        <div class="viewer-count" id="viewer-count"></div>

        <div id="offline-banner">
            <span class="dot"></span>
            <span id="offline-text">No broadcast right now</span>
        </div>

        <div id="password-prompt">
            <label>This broadcast requires a password</label><br><br>
            <input type="password" id="room-password-input" placeholder="Enter password" autocomplete="off">
            <button id="btn-password-submit">Join</button>
            <div id="password-error"></div>
        </div>
    </div>

    <div class="chat-panel">
        <div class="chat-header">
            <span>Chat</span>
            <span class="chat-status" id="chat-status"></span>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
            <div class="chat-nick-prompt" id="chat-nick-prompt">
                <label>Choose a nickname to start chatting</label>
                <div class="nick-row">
                    <input type="text" id="chat-nick" placeholder="Your nickname" maxlength="25" autocomplete="off" spellcheck="false">
                    <button id="btn-chat-join">Join</button>
                </div>
                <div class="nick-error" id="nick-error"></div>
                <div class="nick-hint">Letters, numbers, underscore. 1-25 chars.</div>
            </div>
            <div class="chat-guest-bar" id="chat-guest-bar" onclick="showNickPrompt()">
                <input type="text" placeholder="Pick a nickname to chat..." disabled tabindex="-1">
                <button disabled>Send</button>
            </div>
            <div id="chat-send" style="display:none">
                <div class="chat-nick-badge">Chatting as <span id="chat-nick-display"></span></div>
                <div class="chat-send">
                    <input type="text" id="chat-input" placeholder="Send a message..." maxlength="500" autocomplete="off" spellcheck="false">
                    <button id="btn-chat-send">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video       = document.getElementById('player');
        const qualitySelect = document.getElementById('quality-select');
        const statusEl    = document.getElementById('status');
        const viewerCountEl = document.getElementById('viewer-count');
        const offlineBanner = document.getElementById('offline-banner');
        const offlineText = document.getElementById('offline-text');
        const passwordPrompt = document.getElementById('password-prompt');
        const passwordInput  = document.getElementById('room-password-input');
        const btnPasswordSubmit = document.getElementById('btn-password-submit');
        const passwordError  = document.getElementById('password-error');
        let roomId = null;
        let roomIdFromURL = false;
        let sessionId = null;
        let roomPassword = '';
        let pc = null;
        let audioElement = null;
        let mediaWatchdogInterval = null;
        let pollInterval = null;
        let lastBytesReceived = 0;
        let stallCount = 0;
        let connectTimeout = null;
        let viewerState = 'init';

        video.addEventListener('resize', function() {
            if (video.videoWidth && video.videoHeight) {
                video.style.aspectRatio = video.videoWidth + '/' + video.videoHeight;
            }
        });

        /* ── State Machine ──────────────────────────────────────── */

        function setState(next) {
            if (next === viewerState) return;
            viewerState = next;
            renderState();
            managePoll();
        }

        function renderState() {
            offlineBanner.style.display = 'none';
            passwordPrompt.style.display = 'none';
            statusEl.classList.remove('error');

            switch (viewerState) {
                case 'offline':
                    offlineBanner.style.display = 'block';
                    offlineBanner.classList.remove('live');
                    offlineText.textContent = 'No broadcast right now';
                    statusEl.textContent = 'Offline';
                    viewerCountEl.textContent = '';
                    qualitySelect.disabled = true;
                    break;
                case 'need_password':
                    passwordPrompt.style.display = 'block';
                    statusEl.textContent = 'Password required';
                    qualitySelect.disabled = true;
                    break;
                case 'connecting':
                    statusEl.textContent = 'Connecting...';
                    qualitySelect.disabled = true;
                    break;
                case 'live':
                    statusEl.textContent = 'Live';
                    qualitySelect.disabled = false;
                    break;
                case 'room_full':
                    offlineBanner.style.display = 'block';
                    offlineBanner.classList.remove('live');
                    offlineText.textContent = 'Room is full — retrying...';
                    statusEl.textContent = 'Waiting';
                    qualitySelect.disabled = true;
                    break;
                case 'rate_limited':
                    offlineBanner.style.display = 'block';
                    offlineBanner.classList.remove('live');
                    offlineText.textContent = 'Too many requests — retrying...';
                    statusEl.textContent = 'Waiting';
                    qualitySelect.disabled = true;
                    break;
                default:
                    break;
            }
        }

        function clearPollTimer() {
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
        }

        function managePoll() {
            clearPollTimer();

            if (viewerState === 'room_full' || viewerState === 'rate_limited') {
                pollInterval = setInterval(function () { connectWHEP(); }, 5000);
            } else if (viewerState !== 'init' && viewerState !== 'connecting') {
                pollInterval = setInterval(pollActive, 5000);
            }
        }

        async function pollActive() {
            try {
                if (roomIdFromURL && roomId) {
                    var infoResp = await fetch('/api/room_info/' + roomId);
                    if (!infoResp.ok) return;
                    var info = await infoResp.json();

                    if (viewerState === 'live') {
                        if (!info.is_live) {
                            teardownConnection();
                            setState('offline');
                        } else if (info.has_password && !roomPassword) {
                            teardownConnection();
                            setState('need_password');
                        } else {
                            viewerCountEl.textContent = info.viewer_count + ' watching';
                        }
                        return;
                    }

                    if (!info.is_live) {
                        setState('offline');
                        return;
                    }
                    if (info.has_password && !roomPassword) {
                        setState('need_password');
                    } else {
                        connectWHEP();
                    }
                    return;
                }

                const resp = await fetch('/api/active');
                if (!resp.ok) return;
                const data = await resp.json();

                if (!data.room_id) {
                    if (viewerState === 'live') { teardownConnection(); }
                    setState('offline');
                    return;
                }

                if (viewerState === 'live') {
                    if (data.room_id !== roomId) {
                        teardownConnection();
                        chatDisconnect();
                        roomId = data.room_id;
                        roomPassword = '';
                        passwordInput.value = '';
                    } else {
                        await checkRoomAlive();
                        return;
                    }
                }

                roomId = data.room_id;

                if (data.has_password && !roomPassword) {
                    setState('need_password');
                } else {
                    if (!data.has_password) { roomPassword = ''; passwordInput.value = ''; }
                    connectWHEP();
                }
            } catch (e) { /* ignore */ }
        }

        /* ── Utilities ──────────────────────────────────────────── */

        function getRoomIdFromURL() {
            const parts = window.location.pathname.split('/').filter(Boolean);
            if (parts.length >= 2 && parts[0] === 'watch') {
                return parts[1];
            }
            return null;
        }

        async function checkRoomAlive() {
            if (!roomId) return true;
            try {
                const resp = await fetch('/api/room_info/' + roomId);
                if (!resp.ok) return true;
                const info = await resp.json();
                if (!info.is_live) {
                    teardownConnection();
                    setState('offline');
                    return false;
                }
                viewerCountEl.textContent = info.viewer_count + ' watching';

                if (info.has_password && !roomPassword) {
                    teardownConnection();
                    setState('need_password');
                    return false;
                } else if (!info.has_password && roomPassword) {
                    roomPassword = '';
                    passwordInput.value = '';
                }

                return true;
            } catch (e) { return true; }
        }

        async function fetchICEConfig() {
            try {
                const resp = await fetch('/api/config');
                if (!resp.ok) return {};
                return await resp.json();
            } catch (e) {
                return { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
            }
        }

        async function setQuality(rid) {
            if (!sessionId || !roomId) return;
            try {
                await fetch('/api/quality/' + roomId, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Id': sessionId
                    },
                    body: JSON.stringify({ rid: rid || null })
                });
            } catch (e) { /* ignore */ }
        }

        qualitySelect.onchange = function () { setQuality(qualitySelect.value || null); };

        /* ── WebRTC Lifecycle ───────────────────────────────────── */

        function teardownConnection() {
            clearPollTimer();
            if (connectTimeout) { clearTimeout(connectTimeout); connectTimeout = null; }
            if (mediaWatchdogInterval) { clearInterval(mediaWatchdogInterval); mediaWatchdogInterval = null; }
            if (pc) {
                if (sessionId && roomId) {
                    fetch('/api/whep/' + roomId, {
                        method: 'DELETE',
                        headers: { 'X-Session-Id': sessionId }
                    }).catch(function () {});
                }
                var dying = pc;
                pc = null;
                dying.oniceconnectionstatechange = null;
                dying.onconnectionstatechange = null;
                dying.close();
            }
            video.srcObject = null;
            video.style.aspectRatio = '';
            if (audioElement) {
                audioElement.srcObject = null;
                audioElement.remove();
                audioElement = null;
            }
            sessionId = null;
            lastBytesReceived = 0;
            stallCount = 0;
            qualitySelect.value = '';
        }

        function startMediaWatchdog() {
            lastBytesReceived = 0;
            stallCount = 0;
            mediaWatchdogInterval = setInterval(async function () {
                if (!pc) return;
                try {
                    var stats = await pc.getStats();
                    var totalBytes = 0;
                    stats.forEach(function (report) {
                        if (report.type === 'inbound-rtp') {
                            totalBytes += report.bytesReceived || 0;
                        }
                    });
                    if (totalBytes > lastBytesReceived) {
                        lastBytesReceived = totalBytes;
                        stallCount = 0;
                    } else {
                        stallCount++;
                        if (stallCount >= 5) {
                            teardownConnection();
                            setState('offline');
                        }
                    }
                } catch (e) { /* pc may have closed mid-check */ }
            }, 1000);
        }

        function onPeerStateChange() {
            if (!pc) return;
            var s = pc.iceConnectionState;
            if (s === 'connected' || s === 'completed') {
                if (connectTimeout) { clearTimeout(connectTimeout); connectTimeout = null; }
                setState('live');
                checkRoomAlive();
                startMediaWatchdog();
            } else if (s === 'disconnected' || s === 'failed' || s === 'closed') {
                teardownConnection();
                setState('offline');
            }
        }

        async function connectWHEP() {
            if (!roomId) return;
            if (viewerState === 'connecting') return;

            if (!chatWs && !chatNick) chatConnectGuest();

            teardownConnection();
            setState('connecting');

            const config = await fetchICEConfig();

            pc = new RTCPeerConnection({
                iceServers: config.iceServers || []
            });

            pc.ontrack = function (event) {
                var track = event.track;
                if (track.kind === 'video') {
                    video.srcObject = new MediaStream([track]);
                    video.play().catch(function () {
                        video.muted = true;
                        video.play().catch(function () {});
                    });
                    if (typeof event.receiver.jitterBufferTarget !== 'undefined') {
                        event.receiver.jitterBufferTarget = 0.15;
                    }
                } else if (track.kind === 'audio') {
                    if (audioElement) {
                        audioElement.srcObject = null;
                        audioElement.remove();
                    }
                    audioElement = document.createElement('audio');
                    audioElement.autoplay = true;
                    audioElement.style.display = 'none';
                    document.body.appendChild(audioElement);
                    audioElement.srcObject = new MediaStream([track]);
                    audioElement.play().catch(function () {});
                    if (typeof event.receiver.jitterBufferTarget !== 'undefined') {
                        event.receiver.jitterBufferTarget = 0.15;
                    }
                }
            };

            pc.oniceconnectionstatechange = onPeerStateChange;
            pc.onconnectionstatechange = onPeerStateChange;

            pc.addTransceiver('video', { direction: 'recvonly' });
            pc.addTransceiver('audio', { direction: 'recvonly' });

            try {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                const headers = { 'Content-Type': 'application/sdp' };
                if (roomPassword) {
                    headers['X-Room-Password'] = roomPassword;
                }

                const response = await fetch('/api/whep/' + roomId, {
                    method: 'POST',
                    headers: headers,
                    body: pc.localDescription.sdp
                });

                if (response.status === 404) {
                    teardownConnection();
                    setState('offline');
                    return;
                }
                if (response.status === 403) {
                    teardownConnection();
                    passwordError.textContent = roomPassword ? 'Incorrect password' : '';
                    setState('need_password');
                    return;
                }
                if (response.status === 503) {
                    teardownConnection();
                    setState('room_full');
                    return;
                }
                if (response.status === 429) {
                    teardownConnection();
                    setState('rate_limited');
                    return;
                }
                if (!response.ok) {
                    throw new Error('Server returned ' + response.status);
                }

                sessionId = response.headers.get('X-Session-Id');
                const answerSdp = await response.text();
                await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

                connectTimeout = setTimeout(function () {
                    if (viewerState === 'connecting') {
                        teardownConnection();
                        setState('offline');
                    }
                }, 10000);

            } catch (err) {
                console.error('WHEP connection failed:', err);
                teardownConnection();
                setState('offline');
            }
        }

        /* ── User Actions ───────────────────────────────────────── */

        btnPasswordSubmit.onclick = function () {
            roomPassword = passwordInput.value;
            if (!roomPassword) {
                passwordError.textContent = 'Please enter a password';
                return;
            }
            passwordError.textContent = '';
            connectWHEP();
        };

        passwordInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') btnPasswordSubmit.click();
        });

        /* ── Chat ──────────────────────────────────────────────── */

        var chatWs = null;
        var chatNick = '';
        var chatIsGuest = false;
        var chatConnected = false;
        var chatReconnectTimer = null;
        var chatMessagesEl = document.getElementById('chat-messages');
        var chatStatusEl = document.getElementById('chat-status');
        var chatGuestBar = document.getElementById('chat-guest-bar');
        var chatNickPrompt = document.getElementById('chat-nick-prompt');
        var chatNickInput = document.getElementById('chat-nick');
        var nickError = document.getElementById('nick-error');
        var chatSendEl = document.getElementById('chat-send');
        var chatNickDisplay = document.getElementById('chat-nick-display');
        var chatInput = document.getElementById('chat-input');
        var btnChatJoin = document.getElementById('btn-chat-join');
        var btnChatSend = document.getElementById('btn-chat-send');

        function chatConnect(nick) {
            if (!roomId || !nick) return;
            chatDisconnect();

            var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            var url = proto + '//' + location.host + '/api/chat/' + roomId + '?nick=' + encodeURIComponent(nick);
            chatWs = new WebSocket(url);
            chatStatusEl.textContent = 'Connecting...';
            chatStatusEl.className = 'chat-status';

            chatWs.onopen = function () {
                chatConnected = true;
                chatStatusEl.textContent = 'Connected';
                chatStatusEl.className = 'chat-status connected';
            };

            chatWs.onclose = function () {
                chatConnected = false;
                chatStatusEl.textContent = 'Reconnecting...';
                chatStatusEl.className = 'chat-status';
                var reconnectNick = chatNick || '_guest';
                chatReconnectTimer = setTimeout(function () {
                    if (roomId) chatConnect(reconnectNick);
                }, 3000);
            };

            chatWs.onerror = function () {
                chatConnected = false;
            };

            chatWs.onmessage = function (ev) {
                try {
                    var msg = JSON.parse(ev.data);
                    handleChatMsg(msg);
                } catch (e) { /* ignore */ }
            };
        }

        function chatConnectGuest() {
            chatIsGuest = true;
            chatConnect('_guest');
        }

        function chatDisconnect() {
            if (chatReconnectTimer) { clearTimeout(chatReconnectTimer); chatReconnectTimer = null; }
            if (chatWs) {
                chatWs.onclose = null;
                chatWs.close();
                chatWs = null;
            }
            chatConnected = false;
            chatStatusEl.textContent = '';
            chatStatusEl.className = 'chat-status';
        }

        function handleChatMsg(msg) {
            switch (msg.type) {
                case 'msg':
                    appendChatMessage(msg.nick, msg.text, msg.role);
                    break;
                case 'system':
                    appendChatSystem(msg.text);
                    break;
                case 'clear':
                    chatMessagesEl.innerHTML = '';
                    appendChatSystem('Chat has been cleared.');
                    break;
                case 'ban':
                    appendChatSystem(msg.nick + ' has been banned.');
                    break;
                case 'error':
                    appendChatSystem(msg.text);
                    chatDisconnect();
                    chatNick = '';
                    chatIsGuest = false;
                    chatSendEl.style.display = 'none';
                    chatGuestBar.style.display = '';
                    chatNickPrompt.classList.remove('visible');
                    break;
                default:
                    break;
            }
        }

        function appendChatMessage(nick, text, role) {
            var el = document.createElement('div');
            el.className = 'chat-msg';
            var nickSpan = document.createElement('span');
            nickSpan.className = 'nick ' + (role || 'viewer');
            nickSpan.textContent = nick + ':';
            el.appendChild(nickSpan);
            el.appendChild(document.createTextNode(' ' + text));
            chatMessagesEl.appendChild(el);
            autoScrollChat();
        }

        function appendChatSystem(text) {
            var el = document.createElement('div');
            el.className = 'chat-msg system';
            el.textContent = text;
            chatMessagesEl.appendChild(el);
            autoScrollChat();
        }

        function autoScrollChat() {
            var el = chatMessagesEl;
            var atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
            if (atBottom) {
                el.scrollTop = el.scrollHeight;
            }
        }

        function showNickPrompt() {
            chatNickPrompt.classList.add('visible');
            chatNickInput.focus();
        }

        function chatSendMessage() {
            if (!chatWs || !chatConnected || chatIsGuest) return;
            var text = chatInput.value.trim();
            if (!text) return;
            var type = text[0] === '/' ? 'cmd' : 'msg';
            chatWs.send(JSON.stringify({ type: type, text: text }));
            chatInput.value = '';
        }

        btnChatJoin.onclick = function () {
            var nick = chatNickInput.value.trim();
            nickError.textContent = '';
            if (!nick) {
                nickError.textContent = 'Please enter a nickname.';
                return;
            }
            if (!/^[a-zA-Z0-9_]{1,25}$/.test(nick)) {
                nickError.textContent = '1-25 chars, letters/numbers/underscore only.';
                return;
            }
            chatNick = nick;
            chatIsGuest = false;
            chatNickDisplay.textContent = nick;
            chatNickPrompt.classList.remove('visible');
            chatGuestBar.style.display = 'none';
            chatSendEl.style.display = '';
            chatInput.focus();
            chatConnect(nick);
        };

        chatNickInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') btnChatJoin.click();
        });

        btnChatSend.onclick = chatSendMessage;

        chatInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') chatSendMessage();
        });

        /* ── Init ───────────────────────────────────────────────── */

        (async function init() {
            roomId = getRoomIdFromURL();
            if (roomId) {
                roomIdFromURL = true;
                chatConnectGuest();
            }
            await pollActive();
            if (viewerState === 'init') setState('offline');
        })();
    </script>
</body>
</html>
