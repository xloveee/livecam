<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>livecam</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fff;
        }
        video {
            width: 100%;
            max-width: 960px;
            background: #000;
            aspect-ratio: 16/9;
            border-radius: 4px;
        }
        #controls {
            margin-top: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        select {
            background: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 0.5rem 0.8rem;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
        }
        select:disabled { opacity: 0.4; cursor: default; }
        button {
            background: #d32f2f;
            color: #fff;
            border: none;
            padding: 0.6rem 1.6rem;
            font-size: 0.95rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #b71c1c; }
        button:disabled { background: #555; cursor: default; }
        #status {
            font-size: 0.85rem;
            color: #aaa;
        }
        .error { color: #ef5350; }
        .viewer-count {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.6rem;
        }
        #offline-banner {
            display: none;
            margin-top: 2rem;
            text-align: center;
            color: #888;
            font-size: 1rem;
        }
        #offline-banner .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        #offline-banner.live .dot { background: #d32f2f; }
        #password-prompt {
            display: none;
            margin-top: 1.5rem;
            text-align: center;
        }
        #password-prompt input {
            background: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 0.5rem 0.8rem;
            font-size: 0.9rem;
            border-radius: 4px;
            width: 220px;
            margin-right: 0.5rem;
        }
        #password-prompt button {
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
        }
        #password-error {
            color: #ef5350;
            font-size: 0.85rem;
            margin-top: 0.4rem;
        }
    </style>
</head>
<body>

    <h1>livecam</h1>

    <video id="player" autoplay controls playsinline></video>

    <div id="controls">
        <select id="quality-select" disabled>
            <option value="">Auto</option>
            <option value="h">High (1080p)</option>
            <option value="m">Medium (720p)</option>
            <option value="l">Low (360p)</option>
        </select>
        <span id="status">Checking stream...</span>
    </div>
    <div class="viewer-count" id="viewer-count"></div>

    <div id="offline-banner">
        <span class="dot"></span>
        <span id="offline-text">No broadcast right now</span>
    </div>

    <div id="password-prompt">
        <label>This broadcast requires a password</label><br><br>
        <input type="password" id="room-password-input" placeholder="Enter password" autocomplete="off">
        <button id="btn-password-submit">Join</button>
        <div id="password-error"></div>
    </div>

    <script>
        const video       = document.getElementById('player');
        const qualitySelect = document.getElementById('quality-select');
        const statusEl    = document.getElementById('status');
        const viewerCountEl = document.getElementById('viewer-count');
        const offlineBanner = document.getElementById('offline-banner');
        const offlineText = document.getElementById('offline-text');
        const passwordPrompt = document.getElementById('password-prompt');
        const passwordInput  = document.getElementById('room-password-input');
        const btnPasswordSubmit = document.getElementById('btn-password-submit');
        const passwordError  = document.getElementById('password-error');

        let roomId = null;
        let sessionId = null;
        let roomPassword = '';
        let pc = null;
        let viewerPollInterval = null;
        let mediaWatchdogInterval = null;
        let lastBytesReceived = 0;
        let stallCount = 0;

        function getRoomIdFromURL() {
            const parts = window.location.pathname.split('/').filter(Boolean);
            if (parts.length >= 2 && parts[0] === 'watch') {
                return parts[1];
            }
            return null;
        }

        async function pollViewerCount() {
            if (!roomId) return;
            try {
                const resp = await fetch('/api/room_info/' + roomId);
                if (resp.ok) {
                    const info = await resp.json();
                    viewerCountEl.textContent = info.viewer_count + ' watching';
                }
            } catch (e) { /* ignore */ }
        }

        async function fetchICEConfig() {
            try {
                const resp = await fetch('/api/config');
                if (!resp.ok) return {};
                return await resp.json();
            } catch (e) {
                return { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
            }
        }

        async function setQuality(rid) {
            if (!sessionId || !roomId) return;
            try {
                await fetch('/api/quality/' + roomId, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Id': sessionId
                    },
                    body: JSON.stringify({ rid: rid || null })
                });
            } catch (e) { /* ignore */ }
        }

        qualitySelect.onchange = () => { setQuality(qualitySelect.value || null); };

        function teardownConnection() {
            if (mediaWatchdogInterval) { clearInterval(mediaWatchdogInterval); mediaWatchdogInterval = null; }
            if (viewerPollInterval) { clearInterval(viewerPollInterval); viewerPollInterval = null; }
            if (pc) {
                const dying = pc;
                pc = null;
                dying.oniceconnectionstatechange = null;
                dying.onconnectionstatechange = null;
                dying.close();
            }
            video.srcObject = null;
            qualitySelect.disabled = true;
            sessionId = null;
            lastBytesReceived = 0;
            stallCount = 0;
            viewerCountEl.textContent = '';
        }

        function startMediaWatchdog() {
            lastBytesReceived = 0;
            stallCount = 0;
            mediaWatchdogInterval = setInterval(async () => {
                if (!pc) return;
                try {
                    const stats = await pc.getStats();
                    let totalBytes = 0;
                    stats.forEach(report => {
                        if (report.type === 'inbound-rtp' && report.kind === 'video') {
                            totalBytes += report.bytesReceived || 0;
                        }
                    });
                    if (totalBytes > lastBytesReceived) {
                        lastBytesReceived = totalBytes;
                        stallCount = 0;
                    } else if (lastBytesReceived > 0) {
                        stallCount++;
                        if (stallCount >= 2) {
                            teardownConnection();
                            showOffline();
                        }
                    }
                } catch (e) { /* pc may have closed mid-check */ }
            }, 1000);
        }

        function handleStreamEnded() {
            if (!pc) return;
            teardownConnection();
            statusEl.textContent = 'Stream ended';
            statusEl.classList.add('error');
            showOffline();
        }

        async function connectWHEP() {
            if (!roomId) return;

            statusEl.textContent = 'Connecting...';
            statusEl.classList.remove('error');
            qualitySelect.disabled = true;
            sessionId = null;
            offlineBanner.style.display = 'none';
            passwordError.textContent = '';

            const config = await fetchICEConfig();

            pc = new RTCPeerConnection({
                iceServers: config.iceServers || []
            });

            pc.ontrack = (event) => {
                if (video.srcObject !== event.streams[0]) {
                    video.srcObject = event.streams[0];
                }
            };

            pc.oniceconnectionstatechange = () => {
                const state = pc.iceConnectionState;
                if (state === 'connected' || state === 'completed') {
                    statusEl.textContent = 'Live';
                    statusEl.classList.remove('error');
                    qualitySelect.disabled = false;
                    passwordPrompt.style.display = 'none';
                    pollViewerCount();
                    viewerPollInterval = setInterval(pollViewerCount, 5000);
                    startMediaWatchdog();
                } else if (state === 'disconnected' || state === 'failed' || state === 'closed') {
                    handleStreamEnded();
                }
            };

            pc.onconnectionstatechange = () => {
                const state = pc.connectionState;
                if (state === 'disconnected' || state === 'failed' || state === 'closed') {
                    handleStreamEnded();
                }
            };

            pc.addTransceiver('video', { direction: 'recvonly' });
            pc.addTransceiver('audio', { direction: 'recvonly' });

            try {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                const headers = { 'Content-Type': 'application/sdp' };
                if (roomPassword) {
                    headers['X-Room-Password'] = roomPassword;
                }

                const response = await fetch('/api/whep/' + roomId, {
                    method: 'POST',
                    headers: headers,
                    body: pc.localDescription.sdp
                });

                if (response.status === 403) {
                    pc.close();
                    pc = null;
                    statusEl.textContent = 'Password required';
                    statusEl.classList.add('error');
                    passwordPrompt.style.display = 'block';
                    passwordError.textContent = roomPassword ? 'Incorrect password' : '';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Server returned ' + response.status);
                }

                sessionId = response.headers.get('X-Session-Id');
                const answerSdp = await response.text();
                await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

            } catch (err) {
                console.error('WHEP connection failed:', err);
                statusEl.textContent = 'Connection failed';
                statusEl.classList.add('error');
                showOffline();
            }
        }

        function showOffline() {
            offlineBanner.style.display = 'block';
            offlineBanner.classList.remove('live');
            offlineText.textContent = 'No broadcast right now';
            statusEl.textContent = 'Offline';
            statusEl.classList.remove('error');
        }

        btnPasswordSubmit.onclick = () => {
            roomPassword = passwordInput.value;
            if (!roomPassword) {
                passwordError.textContent = 'Please enter a password';
                return;
            }
            passwordError.textContent = '';
            connectWHEP();
        };

        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') btnPasswordSubmit.click();
        });

        (async function init() {
            roomId = getRoomIdFromURL();
            if (roomId) {
                connectWHEP();
                return;
            }
            try {
                const resp = await fetch('/api/active');
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.room_id) {
                        roomId = data.room_id;
                        if (data.has_password) {
                            passwordPrompt.style.display = 'block';
                            statusEl.textContent = 'Password required';
                        } else {
                            connectWHEP();
                        }
                        return;
                    }
                }
            } catch (e) { /* server unreachable */ }
            showOffline();
        })();
    </script>
</body>
</html>
